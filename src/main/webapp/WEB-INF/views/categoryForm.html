<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        input[type="text"] { width: 100%; padding: 10px; box-sizing: border-box; }
        .error { color: red; font-size: 0.95em; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #357abd; }
        .link-btn { margin-left: 10px; color: #4a90d9; text-decoration: none; }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
    <div class="form-group">
        <input type="text" th:field="*{name}" placeholder="카테고리 이름">
        <div class="error" th:errors="*{name}"></div>
    </div>

    <button type="submit" class="btn">등록</button>
    <a th:href="@{/categories}" class="link-btn">목록으로</a>
</form>

<hr>
<p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2391042 | 성명: 조윤지'}"></p>

</body>
</html>
